name: drift
on:
  schedule:
    - cron: "17 3 * * *"   # nightly, off-peak
  workflow_dispatch: {}     # manual trigger for acceptance
permissions:
  contents: read
  issues: write
jobs:
  detect:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
      empty: ${{ steps.m.outputs.empty }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@3cea4b54ce6f378ca29727fc5daa6eb9db0e43e5
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: m
        uses: ship-iac/shipmate/actions/build-matrix@3cea4b54ce6f378ca29727fc5daa6eb9db0e43e5
        with:
          base-sha: ""
          all-stacks: "true"
  drift:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    runs-on: ubuntu-slim
    permissions: { contents: read, issues: write }
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    name: drift / ${{ matrix.environment }} / ${{ matrix.stack }}
    env:
      TF_VAR_env: ${{ vars.TF_VAR_env }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@3cea4b54ce6f378ca29727fc5daa6eb9db0e43e5
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/drift-cell@3cea4b54ce6f378ca29727fc5daa6eb9db0e43e5
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          state-path: ${{ matrix.stack }}/.state
          github-token: ${{ github.token }}
          slack-webhook: ${{ vars.SLACK_WEBHOOK }}
